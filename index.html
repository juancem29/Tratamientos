<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TPCA">
<meta name="theme-color" content="#111827">
<title>TPCA Practicas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#111;font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;color:#1f2937;}
#app{max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:#f0f2f5;overflow:hidden;}
.pg{display:none;flex-direction:column;flex:1;overflow:hidden;}
.pg.on{display:flex;}
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;flex-shrink:0;color:#fff;}
.hdr h2{font-size:14px;font-weight:700;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#fff;min-width:0;}
.hdr .badge{font-size:11px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;color:#fff;white-space:nowrap;flex-shrink:0;}
.back{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;-webkit-overflow-scrolling:touch;}
#tabbar{display:flex;background:#fff;border-top:1px solid #e5e7eb;flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 5px;gap:2px;border:none;background:none;cursor:pointer;}
.ti{font-size:20px;line-height:1;}
.tl{font-size:11px;font-weight:600;color:#9ca3af;}
.tab.on .tl{color:#111;}
.td{width:4px;height:4px;border-radius:2px;background:#111;display:none;}
.tab.on .td{display:block;}
.card{background:#fff;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.chdr{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px;border:none;width:100%;text-align:left;font-family:inherit;}
.chdr .ct{font-size:13px;font-weight:700;flex:1;line-height:1.4;word-break:break-word;}
.chdr .ca{font-size:13px;font-weight:700;flex-shrink:0;}
.cbdy{padding:14px 16px;font-size:13px;line-height:1.7;color:#1f2937;word-break:break-word;display:none;}
.cbdy.on{display:block;}
.prow{width:100%;display:flex;align-items:center;gap:14px;padding:14px;border-radius:18px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.07);border:none;cursor:pointer;margin-bottom:8px;text-align:left;font-family:inherit;}
.pico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.pinf{flex:1;min-width:0;}
.pnm{font-weight:700;font-size:14px;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.psb{font-size:11px;color:#9ca3af;margin-top:2px;}
.parr{font-size:20px;flex-shrink:0;}
.qrow{background:#fff;border-radius:16px;display:flex;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:8px;}
.qbar{width:4px;flex-shrink:0;}
.qinf{flex:1;display:flex;align-items:center;gap:10px;padding:10px 12px;min-width:0;overflow:hidden;}
.qnm{font-size:13px;font-weight:600;color:#374151;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.qbtns{display:flex;flex-shrink:0;}
.qbtn{padding:10px 12px;font-size:15px;background:none;border:none;border-left:1px solid #f3f4f6;cursor:pointer;}
.mgrd{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.mcrd{background:#fff;border-radius:18px;padding:16px 8px;box-shadow:0 1px 6px rgba(0,0,0,.08);text-align:center;border:none;cursor:pointer;font-family:inherit;width:100%;}
.slbl{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-left:2px;}
.icrd{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;border:1.5px solid #e5e7eb;}
.lhdr{background:#fff;padding:20px 20px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-shrink:0;}
.lhdr h1{font-size:18px;font-weight:800;color:#1f2937;}
.lhdr p{color:#9ca3af;font-size:12px;margin-top:3px;}
.agrd{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.abtn{border-radius:16px;padding:14px 10px;display:flex;align-items:center;gap:8px;justify-content:center;border:none;cursor:pointer;font-family:inherit;width:100%;}
.rtbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;}
.rtb{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;}
.irow{width:100%;display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;background:#fff;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;border:2px solid transparent;font-family:inherit;text-align:left;}
.inum{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.iinf{flex:1;min-width:0;}
.inm{font-size:13px;font-weight:600;color:#1f2937;line-height:1.3;word-break:break-word;}
.ibs{font-size:10px;color:#9ca3af;margin-top:1px;}
.ival{text-align:right;flex-shrink:0;}
.ivn{font-size:14px;font-weight:700;}
.iun{font-size:11px;color:#9ca3af;margin-left:3px;}
.iinput{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.iinput input{width:70px;text-align:right;font-size:14px;font-weight:700;border:none;background:transparent;outline:none;font-family:inherit;border-bottom-width:2px;border-bottom-style:solid;}
.qprog{height:4px;background:rgba(0,0,0,.08);flex-shrink:0;}
.qb{height:100%;transition:width .3s;}
.qst{display:flex;justify-content:space-between;align-items:center;padding:0 2px;margin-bottom:10px;}
.qcrd{background:#fff;border-radius:18px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left-width:4px;border-left-style:solid;margin-bottom:10px;}
.qcrd .qt{font-size:14px;font-weight:700;color:#1f2937;line-height:1.5;word-break:break-word;}
.hbox{border-radius:14px;padding:10px 14px;border-left-width:3px;border-left-style:solid;margin-bottom:10px;}
.optb{width:100%;display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;margin-bottom:8px;font-family:inherit;text-align:left;}
.optl{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:12px;}
.optt{font-size:13px;font-weight:600;line-height:1.4;flex:1;min-width:0;word-break:break-word;}
.bgrd{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.btn{width:100%;padding:13px;border-radius:14px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;display:block;margin-bottom:10px;}
.abox{border-radius:14px;padding:11px 14px;border-left-width:3px;border-left-style:solid;margin-bottom:8px;}
.rtro{text-align:center;font-size:64px;line-height:1;margin-bottom:14px;padding-top:8px;}
.rscr{border-radius:22px;padding:22px 24px;text-align:center;color:#fff;margin-bottom:14px;}
.rn{font-size:44px;font-weight:900;line-height:1;color:#fff;}
.rp{font-size:20px;font-weight:700;margin-top:6px;color:#fff;}
.rg{font-size:13px;margin-top:4px;color:rgba(255,255,255,.8);}
.rsgrd{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.rsbox{border-radius:16px;padding:12px 8px;text-align:center;}
.qbdg{border-radius:12px;padding:4px 12px;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;}
.fct{text-align:center;margin-top:4px;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{width:40px;height:40px;border-radius:50%;border:3px solid #ccc;border-top-color:transparent;animation:spin 1s linear infinite;}
#pdfo{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;background:#1a1a1a;max-width:430px;margin:0 auto;}
#pdfo.on{display:flex;}
#pdfc{flex:1;overflow-y:auto;overflow-x:hidden;background:#2a2a2a;padding:10px 0;-webkit-overflow-scrolling:touch;}
@media(max-width:430px){#app{max-width:100%;}}
</style>
</head>
<body>
<div id="app">
  <div class="pg on" id="pg-home">
    <div id="home-hdr" style="background:#111827;padding:14px 20px;flex-shrink:0;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,.6);">
      <div style="color:#fff;font-size:15px;font-weight:900;letter-spacing:.7px;">PRACTICAS TRATAMIENTOS MARZO</div>
      <div style="color:#f59e0b;font-size:14px;font-weight:800;margin-top:6px;letter-spacing:2px;">By JuanK</div>
      <button onclick="dlSelf()" style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);border-radius:12px;padding:8px 20px;color:#fff;font-size:12px;font-weight:700;margin-top:10px;cursor:pointer;font-family:inherit;">&#11015;&#65039; Guardar en dispositivo</button>
    </div>
    <div class="scr" id="home-body"></div>
  </div>
  <div class="pg" id="pg-list">
    <div class="lhdr"><h1 id="lt"></h1><p id="ls"></p></div>
    <div class="scr" id="list-body"></div>
  </div>
  <div class="pg" id="pg-theory">
    <div class="hdr" id="th-hdr">
      <button class="back" id="th-back">&#8249;</button>
      <span id="th-emo" style="font-size:20px;flex-shrink:0;"></span>
      <h2 id="th-name"></h2>
      <div class="badge">Teoria</div>
    </div>
    <div class="scr" id="th-body"></div>
  </div>
  <div class="pg" id="pg-recipe">
    <div class="hdr" id="rc-hdr">
      <button class="back" id="rc-back">&#8249;</button>
      <span id="rc-emo" style="font-size:20px;flex-shrink:0;"></span>
      <h2 id="rc-name"></h2>
      <div class="badge">Receta</div>
    </div>
    <div class="scr" id="rc-body"></div>
  </div>
  <div class="pg" id="pg-quiz">
    <div class="hdr" id="qz-hdr">
      <button class="back" id="qz-back">&#8249;</button>
      <span id="qz-emo" style="font-size:18px;flex-shrink:0;"></span>
      <h2 id="qz-name"></h2>
      <div class="badge" id="qz-badge"></div>
    </div>
    <div class="qprog"><div class="qb" id="qz-bar"></div></div>
    <div class="scr" id="qz-body"></div>
  </div>
  <div id="tabbar">
    <button class="tab on" id="tab-home" onclick="goTab('home')"><div class="ti">&#127968;</div><div class="tl">Inicio</div><div class="td"></div></button>
    <button class="tab" id="tab-theory" onclick="goTab('theory')"><div class="ti">&#128218;</div><div class="tl">Teoria</div><div class="td"></div></button>
    <button class="tab" id="tab-recipe" onclick="goTab('recipe')"><div class="ti">&#9879;&#65039;</div><div class="tl">Recetas</div><div class="td"></div></button>
    <button class="tab" id="tab-quiz" onclick="goTab('quiz')"><div class="ti">&#129504;</div><div class="tl">Tests</div><div class="td"></div></button>
  </div>
  <div id="pdfo">
    <div id="pdf-hdr" style="padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.5);">
      <button onclick="closePdf()" style="color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;flex-shrink:0;">&#10005;</button>
      <div style="flex:1;min-width:0;">
        <div id="pdf-nm" style="font-weight:700;font-size:13px;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;"></div>
        <div id="pdf-pg" style="font-size:10px;color:rgba(255,255,255,.65);margin-top:1px;">Cargando</div>
      </div>
      <button id="pdf-dl1" style="background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);color:#fff;border-radius:12px;padding:7px 12px;font-weight:700;font-size:12px;cursor:pointer;">&#11015; Guardar</button>
    </div>
    <div id="pdfc"></div>
    <div id="pdf-foot" style="padding:10px 16px;display:flex;gap:10px;flex-shrink:0;">
      <button id="pdf-dl2" style="flex:1;color:#fff;border-radius:14px;padding:13px;font-weight:700;font-size:13px;border:none;cursor:pointer;">&#11015; Descargar PDF</button>
      <button onclick="closePdf()" style="flex:1;background:rgba(255,255,255,.1);color:#fff;border-radius:14px;padding:13px;font-weight:700;font-size:13px;border:1.5px solid rgba(255,255,255,.2);cursor:pointer;">&#8592; Volver</button>
    </div>
  </div>
</div>

    {t:'El tomate Solanum lycopersicum',b:'Originario de los Andes, introducido en Europa por Hernan Cortes en 1521. Cientificamente es una fruta. Aproximadamente 94% agua, rico en potasio, fosforo, magnesio y vitaminas B, C y A. Contiene licopeno (antioxidante, previene enfermedades cardiovasculares).'},

  {id:'deshidratacion',nm:'Deshidratacion de Frutas',em:'&#127815;',

    {t:'1. Clasificacion legal',b:'Fruta fresca: consumo inmediato sin tratamiento. Fruta desecada: humedad reducida por accion natural del aire y el sol. Fruta deshidratada: humedad reducida por procesos autorizados hasta un grado que impida toda alteracion posterior.'},
    {t:'2. Tecnicas empleadas',b:'Deshidratacion termica: eliminacion de agua mediante calor con deshidratador electrico, flujo de aire caliente y ventilacion forzada. Deshidratacion osmotica: tratamiento no termico, inmersion en soluciones concentradas, el agua pasa de la fruta a la solucion por osmosis.'},
    {t:'3. Deshidratacion termica fundamentos',b:'Temperatura optima para frutas: unos 57 grados (rango 50-60 grados). Si la temperatura es demasiado baja: riesgo microbiano antes de deshidratar. Si la temperatura es muy alta: endurecimiento superficial que retiene la humedad interior. La velocidad depende de: temperatura del aire, humedad, espesor del producto y humedad inicial.'},
    {t:'4. Deshidratacion osmotica fundamentos',b:'Frutas con 5-18% de solidos disueltos actuan como membrana semipermeable. Casi no afecta a color, sabor, aroma ni textura. Bajo consumo energetico. Humedad residual: 20-30%, por lo que suele complementarse con un secado posterior a 40 grados.'},
    {t:'5. Solutos osmoticos mas usados',b:'Cloruro sodico (sal): carnes y verduras (mas de 10% concentracion), alta depresion de actividad de agua. Sacarosa: frutas, reduce pardeamiento y retiene aromas. Lactosa: frutas, sustitucion parcial de sacarosa. Glicerol: frutas y verduras, mejora textura. Combinacion: caracteristicas sensoriales ajustadas (Barbosa-Canovas, 1996).'},
    {t:'6. Tratamientos previos',b:'Escaldado: inactiva enzimas, no habitual en frutas (afecta sabor). Acidificado: acido citrico 6 g/L o acido ascorbico 1.5-2 g/L durante 2-3 min; evita pardeamiento, METODO USADO EN ESTA PRACTICA. Sulfatado: metabisulfito sodico, mas efectivo, sin sabor acido, antimicrobiano. Agrietado: NaOH 80 grados 5-10 segundos para eliminar la cera superficial.'},
    {t:'7. Tabla de secado a 57 grados',b:'Tiempos aproximados. Manzana: rodajas, flexible, 4-15 horas. Albaricoque: mitades, flexible, 8-36 horas. Platano: rodajas, quebradizo, 5-24 horas. Bayas: sin humedad visible, 5-24 horas. Cerezas: coriaceo/pegajoso, 6-36 horas. Arandanos: sin humedad visible, 4-20 horas. Uvas (pasas): flexible/coriaceo, 6-36 horas. Nectarinas: flexible, 6-24 horas. Piel naranja: fragil, 6-15 horas. Melocotones: flexible/coriaceo, 5-24 horas. Peras: flexible/coriaceo, 5-24 horas. Caquis: flexible, 5-20 horas. Pina: flexible, 6-36 horas.'},
    {t:'8. Tabla osmotica y calculo Brix',b:'1 grado Brix = 1 g de sacarosa en 100 g de solucion. Ejemplo: 25 Brix = 25 g azucar + 75 g agua. Banana 65 Brix, 8-10 horas. Manzana 40 Brix, 6-8 horas. Fresas 50 Brix, 7-8 horas. Pina 60 Brix, 6-8 horas.'}

   {q:'Que se anade al Hummus al servir?',o:['Nueces y miel','Pimenton y aceite de oliva virgen extra','Tomate y albahaca','Pepino y yogur'],a:1,h:'La especia roja en polvo y el aceite dorado son el acabado tipico.'}

  grisinnis:[

   {q:'Que tipo de harina se usa para los grisinnis?',o:['Harina integral','Harina de fuerza W mayor de 250','Harina floja','Harina de centeno'],a:1,h:'Tiene mayor contenido proteico, necesario para una red de gluten resistente.'},
   {q:'Proteinas que forman el gluten al hidratarse?',o:['Glutenina y gliadina','Caseina y albumina','Colageno y elastina','Albumina y miosina'],a:0,h:'Sus nombres empiezan ambos por gl-, igual que gluten.'},

   {q:'Que se usa para pincelar los grisinnis antes de hornear?',o:['Mantequilla derretida','Huevo batido','Leche entera','AOVE aceite de oliva virgen extra'],a:3,h:'Son las iniciales de Aceite de Oliva Virgen Extra.'},
   {q:'Tiempo de reposo en la primera fermentacion?',o:['15 minutos','30 minutos','1 hora o hasta doblar','2 horas fijas'],a:2,h:'El criterio no es solo tiempo sino tambien que la masa doble su tamano.'}
  ]
};

<script>
// =============================================
// APP
// =============================================
var cur={product:null,recipeIdx:0,ingRef:0,ingVal:null,accordion:0};
var qz={idx:0,sel:null,score:0,skipped:0,done:false,hint:false};
var listMode='theory';

function $(id){return document.getElementById(id);}
function mk(tag,cls,txt){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!==undefined)e.textContent=txt;
  return e;
}
function pg(id){
  var pgs=document.querySelectorAll('.pg');
  for(var i=0;i<pgs.length;i++){pgs[i].classList.remove('on');}
  $(id).classList.add('on');
}
function tab(id){
  var tbs=document.querySelectorAll('.tab');
  for(var i=0;i<tbs.length;i++){tbs[i].classList.remove('on');}
  $(id).classList.add('on');
}

// ─── INIT ───────────────────────────────────
window.onload=function(){buildHome();};

// ─── HOME ───────────────────────────────────
function buildHome(){
  var total=0;
  for(var k in QUIZ){total+=QUIZ[k].length;}
  var body=$('home-body');
  body.innerHTML='';

  var g=mk('div','mgrd');
  var btns=[
    {t:'theory',i:'&#128218;',l:'Teoria',s:PRODUCTS.length+' temas'},
    {t:'recipe',i:'&#9879;&#65039;',l:'Recetas',s:'Calculadora'},
    {t:'quiz',  i:'&#129504;',l:'Tests',  s:total+' preguntas'}
  ];
  btns.forEach(function(b){
    var c=mk('button','mcrd');
    c.innerHTML='<div style="font-size:26px;margin-bottom:6px;">'+b.i+'</div>'+
      '<div style="font-weight:800;color:#1f2937;font-size:12px;">'+b.l+'</div>'+
      '<div style="color:#9ca3af;font-size:10px;margin-top:2px;">'+b.s+'</div>';
    c.onclick=(function(type){return function(){goTab(type);};})(b.t);
    g.appendChild(c);
  });
  body.appendChild(g);

  var ic=mk('div','icrd');
  ic.innerHTML='<div style="font-weight:700;font-size:13px;color:#1f2937;margin-bottom:8px;">&#128242; Como instalar en tu movil</div>'+
    '<div style="font-size:11px;color:#6b7280;line-height:1.8;">'+
    '<b style="color:#1f2937;">Android (Samsung/Chrome):</b><br>'+
    '1. Pulsa Guardar en dispositivo<br>'+
    '2. Abre Descargas y toca el archivo<br>'+
    '3. Menu tres puntos - Anadir a pantalla de inicio<br><br>'+
    '<b style="color:#1f2937;">iPhone (Safari):</b><br>'+
    '1. Guarda y abre en Safari<br>'+
    '2. Pulsa Compartir - Anadir a inicio</div>'+
    '<div style="margin-top:10px;font-size:10px;color:#9ca3af;background:#f9fafb;border-radius:8px;padding:6px 10px;">&#128161; Solo necesita WiFi la 1a vez. Despues funciona sin internet.</div>';
  body.appendChild(ic);

  var lbl=mk('div','slbl','Acceso rapido');
  body.appendChild(lbl);

  PRODUCTS.forEach(function(p){
    var row=mk('div','qrow');
    row.innerHTML='<div class="qbar" style="background:'+p.th.bg+'"></div>'+
      '<div class="qinf"><span style="font-size:18px;flex-shrink:0">'+p.em+'</span>'+
      '<div class="qnm">'+p.nm+'</div></div>'+
      '<div class="qbtns">'+
      '<button class="qbtn">&#128218;</button>'+
      '<button class="qbtn">&#9879;&#65039;</button>'+
      '<button class="qbtn">&#129504;</button></div>';
    var bb=row.querySelectorAll('.qbtn');
    bb[0].onclick=(function(pp){return function(){openTheory(pp);};})(p);
    bb[1].onclick=(function(pp){return function(){openRecipe(pp);};})(p);
    bb[2].onclick=(function(pp){return function(){openQuiz(pp);};})(p);
    body.appendChild(row);
  });
}

// ─── TABS ────────────────────────────────────
function goTab(mode){
  tab('tab-'+mode);
  if(mode==='home'){pg('pg-home');return;}
  listMode=mode;
  buildList();
  pg('pg-list');
}

// ─── LIST ────────────────────────────────────
function buildList(){
  var titles={theory:'&#128218; Teoria',recipe:'&#9879;&#65039; Recetas',quiz:'&#129504; Tests'};
  var total=0; for(var k in QUIZ){total+=QUIZ[k].length;}
  var subs={theory:'Selecciona un tema',recipe:'Calculadora de ingredientes',quiz:total+' preguntas en total'};
  $('lt').innerHTML=titles[listMode];
  $('ls').textContent=subs[listMode];
  var body=$('list-body');
  body.innerHTML='';
  PRODUCTS.forEach(function(p){
    var row=mk('button','prow');
    var qc=(QUIZ[p.id]||[]).length;
    var sub=listMode==='quiz'?qc+' preguntas':p.theory.length+' secciones';
    if(listMode==='quiz'){
      row.innerHTML='<div class="pico" style="background:'+p.th.li+'">'+p.em+'</div>'+
        '<div class="pinf"><div class="pnm">'+p.nm+'</div><div class="psb">'+sub+'</div></div>'+
        '<div class="qbdg" style="background:'+p.th.bg+'">'+qc+'</div>';
      row.onclick=(function(pp){return function(){openQuiz(pp);};})(p);
    } else {
      row.innerHTML='<div class="pico" style="background:'+p.th.li+'">'+p.em+'</div>'+
        '<div class="pinf"><div class="pnm">'+p.nm+'</div><div class="psb">'+sub+'</div></div>'+
        '<div class="parr" style="color:'+p.th.bg+'">&#8250;</div>';
      if(listMode==='theory'){row.onclick=(function(pp){return function(){openTheory(pp);};})(p);}
      else{row.onclick=(function(pp){return function(){openRecipe(pp);};})(p);}
    }
    body.appendChild(row);
  });
}

// ─── THEORY ─────────────────────────────────
function openTheory(p){
  cur.product=p; cur.accordion=0;
  $('th-hdr').style.background=p.th.bg;
  $('th-emo').innerHTML=p.em;
  $('th-name').textContent=p.nm;
  $('th-back').onclick=function(){goTab('theory');};
  tab('tab-theory');
  buildTheory();
  pg('pg-theory');
}
function buildTheory(){
  var p=cur.product;
  var body=$('th-body');
  body.innerHTML='';

  var pdfUrl=(PDF_URLS[p.id]||'');
  var hasPdf=pdfUrl&&pdfUrl!=='#';

  var ag=mk('div','agrd');
  var pb=mk('button','abtn');
  pb.style.background=hasPdf?p.th.bg:'#e5e7eb';
  pb.style.opacity=hasPdf?'1':'0.55';
  pb.innerHTML='<span style="font-size:20px;flex-shrink:0;">&#128196;</span>'+
    '<div style="text-align:left;min-width:0;">'+
    '<div style="font-weight:700;font-size:12px;color:'+(hasPdf?'#fff':'#9ca3af')+';">PDF Original</div>'+
    '<div style="font-size:9px;margin-top:2px;color:'+(hasPdf?'rgba(255,255,255,.75)':'#9ca3af')+';">'+(hasPdf?'Ver y Descargar':'Sin enlace aun')+'</div></div>';
  if(hasPdf){pb.onclick=(function(pp){return function(){openPdf(pp);};})(p);}
  ag.appendChild(pb);

  var qb=mk('button','abtn');
  qb.style.background=p.th.dk;
  qb.innerHTML='<span style="font-size:20px;flex-shrink:0;">&#129504;</span>'+
    '<div style="text-align:left;min-width:0;">'+
    '<div style="font-weight:700;font-size:12px;color:#fff;">Test</div>'+
    '<div style="font-size:9px;margin-top:2px;color:rgba(255,255,255,.75);">'+(QUIZ[p.id]||[]).length+' preguntas</div></div>';
  qb.onclick=(function(pp){return function(){openQuiz(pp);};})(p);
  ag.appendChild(qb);
  body.appendChild(ag);

  p.theory.forEach(function(s,i){
    var card=mk('div','card');
    var isO=cur.accordion===i;
    var hdr=mk('button','chdr');
    hdr.style.background=isO?p.th.bg:'#fff';
    hdr.innerHTML='<span class="ct" style="color:'+(isO?'#fff':p.th.bg)+'">'+s.t+'</span>'+
      '<span class="ca" style="color:'+(isO?'#fff':p.th.bg)+'">'+(isO?'&#9650;':'&#9660;')+'</span>';
    var bdy=mk('div','cbdy'+(isO?' on':''));
    bdy.textContent=s.b;
    hdr.onclick=(function(idx){return function(){
      cur.accordion=(cur.accordion===idx?-1:idx);
      buildTheory();
    };})(i);
    card.appendChild(hdr);
    card.appendChild(bdy);
    body.appendChild(card);
  });
}

// ─── RECIPE ─────────────────────────────────
function openRecipe(p){
  cur.product=p; cur.recipeIdx=0; cur.ingRef=0; cur.ingVal=null;
  $('rc-hdr').style.background=p.th.bg;
  $('rc-emo').innerHTML=p.em;
  $('rc-name').textContent=p.nm;
  $('rc-back').onclick=function(){goTab('recipe');};
  tab('tab-recipe');
  buildRecipe();
  pg('pg-recipe');
}
function buildRecipe(){
  var p=cur.product;
  var recipe=p.recipes[cur.recipeIdx];
  if(cur.ingVal===null)cur.ingVal=recipe.ings[0].b;
  var refBase=recipe.ings[cur.ingRef].b;
  var fv=parseFloat(cur.ingVal);
  var factor=(fv>0)?fv/refBase:1;
  function fmt(b){var v=b*factor;return v<1?v.toFixed(3):v<10?v.toFixed(2):v<100?v.toFixed(1):Math.round(v).toString();}
  var body=$('rc-body');
  body.innerHTML='';

  if(p.recipes.length>1){
    var tabs=mk('div','rtbs');
    p.recipes.forEach(function(r,i){
      var tb=mk('button','rtb');
      tb.textContent=r.nm;
      tb.style.background=cur.recipeIdx===i?p.th.bg:p.th.li;
      tb.style.color=cur.recipeIdx===i?'#fff':p.th.dk;
      tb.onclick=(function(idx,pp){return function(){
        cur.recipeIdx=idx;cur.ingRef=0;
        cur.ingVal=pp.recipes[idx].ings[0].b;
        buildRecipe();
      };})(i,p);
      tabs.appendChild(tb);
    });
    body.appendChild(tabs);
  }

  var rn=mk('div','');
  rn.style.cssText='font-size:13px;font-weight:700;color:#374151;margin-bottom:12px;padding-left:4px;';
  rn.textContent=recipe.nm;
  body.appendChild(rn);

  var ch=mk('div','');
  ch.style.cssText='background:'+p.th.li+';border-left:3px solid '+p.th.bg+';border-radius:14px;padding:10px 12px;margin-bottom:12px;';
  ch.innerHTML='<div style="color:'+p.th.bg+';font-weight:700;font-size:12px;">&#128290; Calculadora proporcional</div>'+
    '<div style="color:#6b7280;font-size:11px;margin-top:2px;">Toca un ingrediente, escribe la cantidad y el resto se ajusta automaticamente.</div>';
  body.appendChild(ch);

  recipe.ings.forEach(function(ing,i){
    var isR=cur.ingRef===i;
    var row=mk('button','irow');
    row.style.borderColor=isR?p.th.bg:'transparent';

    var num=mk('div','inum');
    num.style.cssText='width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:'+(isR?p.th.bg:p.th.li)+';color:'+(isR?'#fff':p.th.bg)+';';
    num.textContent=i+1;
    row.appendChild(num);

    var inf=mk('div','iinf');
    inf.innerHTML='<div class="inm">'+ing.n+'</div><div class="ibs">Base: '+ing.b+' '+ing.u+'</div>';
    row.appendChild(inf);

    if(isR){
      var wrap=document.createElement('div');
      wrap.className='iinput';
      var inp=document.createElement('input');
      inp.type='number';
      inp.value=String(cur.ingVal);
      inp.style.borderBottomColor=p.th.bg;
      inp.style.color=p.th.bg;
      inp.oninput=function(e){cur.ingVal=e.target.value;buildRecipe();};
      inp.onclick=function(e){e.stopPropagation();};
      var un=mk('span','');
      un.style.cssText='font-size:11px;color:#9ca3af;';
      un.textContent=ing.u;
      wrap.appendChild(inp);
      wrap.appendChild(un);
      row.appendChild(wrap);
    } else {
      var val=mk('div','ival');
      val.innerHTML='<span class="ivn" style="color:'+p.th.bg+'">'+fmt(ing.b)+'</span>'+
        '<span class="iun">'+ing.u+'</span>';
      row.appendChild(val);
    }
    row.onclick=(function(idx,ii){return function(){
      var curv=ii.b*factor;
      cur.ingRef=idx;
      cur.ingVal=curv<1?parseFloat(curv.toFixed(3)):curv<100?parseFloat(curv.toFixed(2)):Math.round(curv);
      buildRecipe();
    };})(i,ing);
    body.appendChild(row);
  });

  if(Math.abs(factor-1)>0.001){
    var fb=mk('div','fct');
    fb.innerHTML='<span style="font-size:11px;color:#9ca3af;background:#fff;border-radius:20px;padding:3px 12px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:inline-block;">Factor: x'+factor.toFixed(4)+'</span>';
    body.appendChild(fb);
  }
}

// ─── QUIZ ────────────────────────────────────
function openQuiz(p){
  cur.product=p;
  qz={idx:0,sel:null,score:0,skipped:0,done:false,hint:false};
  $('qz-hdr').style.background=p.th.bg;
  $('qz-emo').innerHTML=p.em;
  $('qz-back').onclick=function(){goTab('quiz');};
  tab('tab-quiz');
  buildQuiz();
  pg('pg-quiz');
}
function buildQuiz(){
  var p=cur.product, th=p.th;
  var qs=QUIZ[p.id]||[];
  var body=$('qz-body');
  var bar=$('qz-bar');
  body.innerHTML='';

  if(qz.done){
    $('qz-name').textContent='Resultado final';
    $('qz-badge').textContent='Fin';
    bar.style.width='100%'; bar.style.background=th.bg;
    var pct=Math.round((qz.score/qs.length)*100);
    var grade=pct>=90?'Excelente':pct>=70?'Notable':pct>=50?'Aprobado':'Repasa el tema';

    var tro=mk('div','rtro');
    tro.textContent=pct>=90?'?':pct>=70?'?':pct>=50?'?':'?';
    tro.innerHTML=pct>=90?'&#127942;':pct>=70?'&#129351;':pct>=50?'&#129352;':'&#128216;';
    body.appendChild(tro);

    var sc=mk('div','rscr');
    sc.style.background=th.bg;
    sc.innerHTML='<div class="rn">'+qz.score+'/'+qs.length+'</div>'+
      '<div class="rp">'+pct+'%</div><div class="rg">'+grade+'</div>';
    body.appendChild(sc);

    var sg=mk('div','rsgrd');
    [{l:'Correctas',v:qz.score,c:'#16a34a',bg:'#dcfce7'},
     {l:'Incorrectas',v:qs.length-qz.score-qz.skipped,c:'#dc2626',bg:'#fee2e2'},
     {l:'Sin resp.',v:qz.skipped,c:'#9a7000',bg:'#fefde7'}
    ].forEach(function(x){
      var box=mk('div','rsbox');
      box.style.background=x.bg;
      box.innerHTML='<div style="font-size:22px;font-weight:900;color:'+x.c+'">'+x.v+'</div>'+
        '<div style="font-size:10px;font-weight:600;color:'+x.c+';margin-top:2px;line-height:1.2;">'+x.l+'</div>';
      sg.appendChild(box);
    });
    body.appendChild(sg);

    var rep=mk('button','btn');
    rep.style.cssText='background:'+th.bg+';color:#fff;box-shadow:0 2px 10px '+th.bg+'44;';
    rep.innerHTML='&#128260; Repetir test';
    rep.onclick=function(){qz={idx:0,sel:null,score:0,skipped:0,done:false,hint:false};buildQuiz();};
    body.appendChild(rep);

    var bk=mk('button','btn');
    bk.style.cssText='background:#fff;color:#374151;border:1.5px solid #e5e7eb;';
    bk.innerHTML='&#8592; Volver al listado';
    bk.onclick=function(){goTab('quiz');};
    body.appendChild(bk);
    return;
  }

  var q=qs[qz.idx];
  $('qz-name').textContent=p.nm;
  $('qz-badge').textContent=(qz.idx+1)+'/'+qs.length;
  bar.style.width=(((qz.idx+1)/qs.length)*100)+'%';
  bar.style.background=th.bg;

  var sr=mk('div','qst');
  sr.innerHTML='<span style="font-size:11px;color:#9ca3af;">Pregunta '+(qz.idx+1)+' de '+qs.length+'</span>'+
    '<div style="display:flex;gap:8px;">'+
    '<span style="font-size:11px;font-weight:700;color:#16a34a;">OK '+qz.score+'</span>'+
    '<span style="font-size:11px;font-weight:700;color:#9ca3af;">Skip '+qz.skipped+'</span></div>';
  body.appendChild(sr);

  var qcrd=mk('div','qcrd');
  qcrd.style.borderLeftColor=th.bg;
  var qt=mk('div','qt');
  qt.textContent=q.q;
  qcrd.appendChild(qt);
  body.appendChild(qcrd);

  if(qz.hint){
    var hb=mk('div','hbox');
    hb.style.cssText='background:'+th.li+';border-left-color:'+th.bg+';';
    hb.innerHTML='<div style="font-size:11px;font-weight:700;color:'+th.bg+';margin-bottom:3px;">Pista</div>'+
      '<div style="font-size:12px;color:#374151;line-height:1.5;word-break:break-word;">'+(q.h||'No hay pista disponible.')+'</div>';
    body.appendChild(hb);
  }

  q.o.forEach(function(opt,i){
    var isC=i===q.a, isSel=i===qz.sel;
    var rev=qz.sel!==null&&qz.sel!==-1;
    var bg='#fff', border='1.5px solid #e5e7eb', color='#374151';
    var nb=th.li, nc=th.bg;
    if(rev){
      if(isC){bg='#dcfce7';border='2px solid #16a34a';color='#15803d';nb='#16a34a';nc='#fff';}
      else if(isSel){bg='#fee2e2';border='2px solid #dc2626';color='#b91c1c';nb='#dc2626';nc='#fff';}
      else{nb='#f3f4f6';nc='#9ca3af';}
    }
    var ob=mk('button','optb');
    ob.style.cssText='background:'+bg+';border:'+border+';cursor:'+(qz.sel!==null?'default':'pointer')+';';
    ob.innerHTML='<div class="optl" style="background:'+nb+';color:'+nc+'">'+String.fromCharCode(65+i)+'</div>'+
      '<div class="optt" style="color:'+color+'">'+opt+'</div>'+
      (rev?(isC?'<span style="font-size:16px;flex-shrink:0;">&#9989;</span>':isSel?'<span style="font-size:16px;flex-shrink:0;">&#10060;</span>':''):'');
    ob.onclick=(function(idx){return function(){
      if(qz.sel!==null)return;
      qz.sel=idx;
      if(idx===q.a)qz.score++;
      buildQuiz();
    };})(i);
    body.appendChild(ob);
  });

  if(qz.sel===null){
    var bg2=mk('div','bgrd');
    var hBtn=mk('button','btn');
    hBtn.style.cssText='background:'+(qz.hint?th.bg:th.li)+';color:'+(qz.hint?'#fff':th.bg)+';margin-bottom:0;';
    hBtn.textContent=qz.hint?'Ocultar pista':'Pista';
    hBtn.onclick=function(){qz.hint=!qz.hint;buildQuiz();};
    var skBtn=mk('button','btn');
    skBtn.style.cssText='background:#f3f4f6;color:#6b7280;border:1.5px solid #e5e7eb;margin-bottom:0;';
    skBtn.textContent='No lo se';
    skBtn.onclick=function(){qz.sel=-1;qz.skipped++;buildQuiz();};
    bg2.appendChild(hBtn);
    bg2.appendChild(skBtn);
    body.appendChild(bg2);
  } else {
    var ac=qz.sel===q.a?'#16a34a':qz.sel===-1?'#9a7000':'#dc2626';
    var abg=qz.sel===q.a?'#dcfce7':qz.sel===-1?'#fefde7':'#fee2e2';
    var abox=mk('div','abox');
    abox.style.cssText='background:'+abg+';border-left-color:'+ac+';';
    var atxt=mk('div','');
    atxt.style.cssText='font-weight:700;font-size:12px;line-height:1.4;word-break:break-word;color:'+ac+';';
    atxt.textContent=qz.sel===q.a?'Correcto!':qz.sel===-1?'Saltada - Respuesta: '+q.o[q.a]:'Incorrecto - Correcta: '+q.o[q.a];
    abox.appendChild(atxt);
    body.appendChild(abox);

    var nb2=mk('button','btn');
    nb2.style.cssText='background:'+th.bg+';color:#fff;box-shadow:0 2px 10px '+th.bg+'44;';
    nb2.textContent=qz.idx+1<qs.length?'Siguiente':'Ver resultado';
    nb2.onclick=function(){
      if(qz.idx+1>=qs.length){qz.done=true;}
      else{qz.idx++;qz.sel=null;qz.hint=false;}
      buildQuiz();
    };
    body.appendChild(nb2);
  }
}

// ─── PDF ────────────────────────────────────
function openPdf(p){
  var url=PDF_URLS[p.id]||'';
  var th=p.th;
  $('pdf-hdr').style.background=th.bg;
  $('pdf-foot').style.background=th.dk;
  $('pdf-nm').textContent=p.nm;
  $('pdf-pg').textContent='Cargando...';
  function dl(){
    var a=document.createElement('a');
    a.href=url; a.download=p.nm+'.pdf';
    document.body.appendChild(a); a.click(); a.remove();
  }
  $('pdf-dl1').onclick=dl;
  $('pdf-dl2').style.background=th.bg;
  $('pdf-dl2').onclick=dl;
  var content=$('pdfc');
  content.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;">'+
    '<div class="spin" style="border-color:'+th.bg+';border-top-color:transparent;"></div>'+
    '<div style="color:rgba(255,255,255,.6);font-size:13px;">Cargando PDF...</div></div>';
  $('pdfo').classList.add('on');

  if(typeof pdfjsLib==='undefined'){
    content.innerHTML='<div style="padding:24px;text-align:center;">'+
      '<div style="font-size:48px;margin-bottom:16px;">&#128196;</div>'+
      '<div style="color:#fff;font-size:15px;font-weight:700;margin-bottom:8px;">'+p.nm+'</div>'+
      '<div style="color:rgba(255,255,255,.7);font-size:13px;margin-bottom:24px;">El visor de PDF necesita conexion a internet la primera vez.</div>'+
      '<button onclick="(function(){var a=document.createElement('a');a.href=''+url+'';a.download=''+p.nm+'.pdf';document.body.appendChild(a);a.click();a.remove();})()" '+
      'style="background:#fff;color:#333;border:none;border-radius:14px;padding:13px 24px;font-weight:700;font-size:14px;cursor:pointer;">'+
      '&#11015; Descargar PDF</button></div>';
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  var b64=url.split(',')[1];
  var bin=atob(b64);
  var arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++){arr[i]=bin.charCodeAt(i);}
  var vw=Math.min(window.innerWidth,430);
  pdfjsLib.getDocument({data:arr}).promise.then(function(pdf){
    content.innerHTML='';
    $('pdf-pg').textContent=pdf.numPages+' paginas';
    var chain=Promise.resolve();
    var nums=[];
    for(var pg2=1;pg2<=pdf.numPages;pg2++){nums.push(pg2);}
    nums.forEach(function(pageNum){
      chain=chain.then(function(){
        return pdf.getPage(pageNum).then(function(page){
          var vp=page.getViewport({scale:1});
          var scale=vw/vp.width;
          var sv=page.getViewport({scale:scale});
          var canvas=document.createElement('canvas');
          canvas.width=sv.width; canvas.height=sv.height;
          canvas.style.cssText='display:block;width:100%;background:#fff;';
          return page.render({canvasContext:canvas.getContext('2d'),viewport:sv}).promise.then(function(){
            var wrap=document.createElement('div');
            wrap.style.cssText='width:100%;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.4);';
            wrap.appendChild(canvas);
            content.appendChild(wrap);
          });
        });
      });
    });
    return chain;
  }).catch(function(e){
    content.innerHTML='<div style="color:#f87171;font-size:13px;padding:24px;text-align:center;">Error: '+e.message+'</div>';
  });
}
function closePdf(){
  $('pdfo').classList.remove('on');
  $('pdfc').innerHTML='';
}

// ─── DOWNLOAD SELF ───────────────────────────
function dlSelf(){
  try{
    var blob=new Blob(['<!DOCTYPE html>
'+document.documentElement.outerHTML],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='TPCA_Practicas_Tratamientos_Marzo.html';
    document.body.appendChild(a); a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},2000);
  }catch(e){alert('Error: '+e.message);}
}
